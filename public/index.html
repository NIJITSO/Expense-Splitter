<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Auth Section -->
    <div id="auth-section" class="view section active">
      <div class="glass-card auth-card">
        <h1 class="gradient-text">SplitFlow</h1>
        <p class="subtitle">Split expenses smoothly.</p>
        <div class="tabs">
          <button type="button" id="tab-login" class="tab active" onclick="switchAuthTab('login')">Login</button>
          <button type="button" id="tab-register" class="tab" onclick="switchAuthTab('register')">Register</button>
        </div>
        <form id="auth-form" onsubmit="handleAuth(event)">
          <input type="text" id="auth-name" placeholder="Name" style="display: none;">
          <input type="email" id="auth-email" placeholder="Email" required>
          <input type="password" id="auth-password" placeholder="Password" required>
          <button type="submit" class="primary-btn">Continue</button>
        </form>
        <div id="auth-error" class="error-msg"></div>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="view section">
      <header class="navbar">
        <h2 class="gradient-text">SplitFlow</h2>
        <div class="nav-actions">
          <span id="user-greeting"></span>
          <button onclick="logout()" class="text-btn">Logout</button>
        </div>
      </header>
      <main class="dashboard-content">
        <div class="header-row">
          <h3>Your Groups</h3>
          <button onclick="openModal('create-group-modal')" class="primary-btn small"> + New Group</button>
        </div>
        <div id="groups-list" class="grid-list">
          <!-- Groups injected here -->
        </div>
      </main>
    </div>

    <!-- Group Detail Section -->
    <div id="group-section" class="view section">
      <header class="navbar">
        <h2 class="gradient-text cursor-pointer" onclick="showDashboard()">← Back to Dashboard</h2>
      </header>
      <main class="group-content">
        <div class="glass-card group-header">
          <h2 id="group-title">Group Name</h2>
          <p id="group-desc">Description</p>
        </div>

        <div class="layout-grid">
          <div class="col">
            <div class="header-row">
              <h3>Expenses</h3>
              <button onclick="openModal('add-expense-modal')" class="primary-btn small">+ Add Expense</button>
            </div>
            <div id="expenses-list" class="list"></div>
          </div>

          <div class="col">
            <div class="header-row">
              <h3>Balances Overview</h3>
            </div>
            <div id="balances-list" class="list glass-card highlight-card"></div>
            
            <div class="header-row mt-4">
              <h3>Members</h3>
              <button onclick="openModal('add-member-modal')" class="primary-btn small"> + Invite</button>
            </div>
            <div id="members-list" class="list tags-list"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modals -->
    <div id="create-group-modal" class="modal">
      <div class="modal-content glass-card">
        <h3>Create New Group</h3>
        <form onsubmit="handleCreateGroup(event)">
          <input type="text" id="new-group-name" placeholder="Group Name" required>
          <input type="text" id="new-group-desc" placeholder="Description">
          <div class="modal-actions">
            <button type="button" onclick="closeModal('create-group-modal')" class="text-btn">Cancel</button>
            <button type="submit" class="primary-btn">Create</button>
          </div>
        </form>
      </div>
    </div>

    <div id="add-member-modal" class="modal">
      <div class="modal-content glass-card">
        <h3>Add Member</h3>
        <form onsubmit="handleAddMember(event)">
          <input type="email" id="new-member-email" placeholder="User's Email" required>
          <div class="modal-actions">
            <button type="button" onclick="closeModal('add-member-modal')" class="text-btn">Cancel</button>
            <button type="submit" class="primary-btn">Add User</button>
          </div>
        </form>
      </div>
    </div>

    <div id="add-expense-modal" class="modal">
      <div class="modal-content glass-card">
        <h3>Add Expense</h3>
        <p class="text-muted" style="margin-bottom: 1rem; font-size: 0.85rem;">This expense will be paid by you and split equally among all members.</p>
        <form onsubmit="handleAddExpense(event)">
          <input type="text" id="new-expense-desc" placeholder="What was this for? (e.g. Dinner)" required>
          <input type="number" id="new-expense-amount" placeholder="Amount ($)" step="0.01" required>
          <div class="modal-actions">
            <button type="button" onclick="closeModal('add-expense-modal')" class="text-btn">Cancel</button>
            <button type="submit" class="primary-btn">Add Expense</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
